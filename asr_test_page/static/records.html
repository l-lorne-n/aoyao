<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>病历录入</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/records.css?v=20260628_diagnosis_records8" />
    <link rel="stylesheet" href="/gamepad-nav.css?v=20260628_diagnosis_records1" />
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">
        <div class="brand">
          <h1>病历录入</h1>
          <p id="dbStatus">读取中</p>
        </div>
        <button id="newRecordButton" class="full primary">新建病历</button>
        <div class="search-with-voice">
          <input id="addressRecordSearchInput" class="search" placeholder="搜索地址、编号" autocomplete="off" />
          <button
            type="button"
            class="voice-button voice-icon-button voice-inline-button"
            data-voice-mode="address-record"
            data-voice-scope="search"
            data-voice-label="地址编号搜索"
            data-target="addressRecordSearchInput"
            data-gamepad-skip="true"
            tabindex="-1"
            aria-label="录制地址编号搜索"
            title="录制地址编号搜索"
          ></button>
        </div>
        <input id="searchInput" class="search" placeholder="搜索姓名、电话、诊断" />
        <div id="recordList" class="record-list"></div>
        <div class="sidebar-footer">
          <button id="exportButton" class="full" type="button">导出病历</button>
        </div>
      </aside>

      <section class="form-pane">
        <header class="form-toolbar">
          <div>
            <strong id="formTitle">新建病历</strong>
            <span id="saveStatus">未保存</span>
          </div>
          <div class="toolbar-actions">
            <button id="trashButton" type="button">垃圾桶</button>
            <a href="/history.html" class="link-button">按时间查看</a>
            <a href="/" class="link-button">语音测试</a>
            <button id="deleteButton" class="danger" disabled>删除</button>
            <button id="saveButton" class="primary">保存病历</button>
          </div>
        </header>

        <form id="recordForm" class="paper-form">
          <section class="section compact">
            <div class="grid basic-grid">
              <label for="patientAddress" class="address-field">
                <span>地址</span>
                <div class="inline-voice-field">
                  <select id="patientAddress"></select>
                  <button
                    type="button"
                    class="voice-button voice-icon-button voice-inline-button"
                    data-voice-mode="address-record"
                    data-voice-scope="form"
                    data-voice-label="地址编号"
                    data-target="patientAddress"
                    data-gamepad-skip="true"
                    tabindex="-1"
                    aria-label="录制地址编号"
                    title="录制地址编号"
                  ></button>
                </div>
              </label>
              <label for="recordNo">
                <span>病历编号</span>
                <input id="recordNo" autocomplete="off" />
              </label>
              <label for="patientName">
                <span>姓名</span>
                <input id="patientName" autocomplete="off" />
              </label>
              <label for="patientGender">
                <span>性别</span>
                <select id="patientGender">
                  <option value=""></option>
                  <option>女</option>
                  <option>男</option>
                </select>
              </label>
              <label for="patientAge">
                <span>年龄</span>
                <div class="inline-voice-field">
                  <input id="patientAge" inputmode="numeric" />
                  <button
                    type="button"
                    class="voice-button voice-icon-button voice-inline-button"
                    data-voice-mode="number"
                    data-voice-label="年龄"
                    data-target="patientAge"
                    data-gamepad-skip="true"
                    tabindex="-1"
                    aria-label="录制年龄"
                    title="录制年龄"
                  ></button>
                </div>
              </label>
              <label for="patientPhone">
                <span>电话</span>
                <input id="patientPhone" inputmode="tel" />
              </label>
              <label for="recordDate">
                <span>建档时间</span>
                <input id="recordDate" type="date" />
              </label>
            </div>
          </section>

          <section class="section two-col">
            <div>
              <div class="field-head">
                <label for="pastHistory">既往史</label>
              </div>
              <div class="voice-textarea">
                <textarea id="pastHistory" rows="4"></textarea>
                <button
                  type="button"
                  class="voice-button voice-icon-button"
                  data-target="pastHistory"
                  data-gamepad-skip="true"
                  tabindex="-1"
                  aria-label="录制既往史"
                  title="录制既往史"
                ></button>
              </div>
            </div>
            <div>
              <div class="field-head">
                <label for="allergyHistory">过敏史</label>
              </div>
              <div class="voice-textarea">
                <textarea id="allergyHistory" rows="4"></textarea>
                <button
                  type="button"
                  class="voice-button voice-icon-button"
                  data-target="allergyHistory"
                  data-gamepad-skip="true"
                  tabindex="-1"
                  aria-label="录制过敏史"
                  title="录制过敏史"
                ></button>
              </div>
            </div>
          </section>

          <section class="section visits-section">
            <div class="section-head-inline">
              <h2>诊断记录</h2>
            </div>
            <div id="visitBlocks" class="visit-blocks"></div>
            <div class="visit-footer">
              <button id="addVisitButton" type="button">增加诊断</button>
            </div>
          </section>

          <section class="section">
            <div class="field-head">
              <label for="notes">备注</label>
            </div>
            <div class="voice-textarea">
              <textarea id="notes" rows="3"></textarea>
              <button
                type="button"
                class="voice-button voice-icon-button"
                data-target="notes"
                data-gamepad-skip="true"
                tabindex="-1"
                aria-label="录制备注"
                title="录制备注"
              ></button>
            </div>
          </section>
      </form>
      </section>
    </main>

    <section id="exportOverlay" class="modal-overlay" hidden>
      <div class="export-dialog" role="dialog" aria-modal="true" aria-labelledby="exportTitle">
        <header class="export-header">
          <div>
            <strong id="exportTitle">导出病历</strong>
            <span id="exportStatus">选择要导出的病历</span>
          </div>
          <button id="exportCloseButton" type="button">关闭</button>
        </header>
        <div class="export-body">
          <input id="exportSearchInput" class="search" placeholder="按编号或姓名检索" />
          <div id="exportRecordList" class="export-record-list"></div>
        </div>
        <footer class="export-actions">
          <button id="exportCancelButton" type="button">取消</button>
          <button id="exportPdfButton" class="primary" type="button">导出 PDF</button>
        </footer>
      </div>
    </section>

    <section id="trashOverlay" class="modal-overlay" hidden>
      <div class="export-dialog trash-dialog" role="dialog" aria-modal="true" aria-labelledby="trashTitle">
        <header class="export-header">
          <div>
            <strong id="trashTitle">垃圾桶</strong>
            <span id="trashStatus">读取中</span>
          </div>
          <button id="trashCloseButton" type="button">关闭</button>
        </header>
        <div class="export-body trash-body">
          <div id="trashRecordList" class="trash-record-list"></div>
        </div>
        <footer class="export-actions">
          <button id="trashCancelButton" type="button">关闭</button>
        </footer>
      </div>
    </section>

    <section id="unsavedOverlay" class="modal-overlay" hidden>
      <div class="export-dialog unsaved-dialog" role="dialog" aria-modal="true" aria-labelledby="unsavedTitle">
        <header class="export-header">
          <div>
            <strong id="unsavedTitle">有未保存修改</strong>
            <span id="unsavedStatus">当前病历有未保存修改。</span>
          </div>
          <button id="unsavedCloseButton" type="button">取消</button>
        </header>
        <div class="unsaved-body">
          <p>继续操作前，请先选择如何处理当前修改。</p>
          <p>如果不保存继续，当前页面里的改动会被丢弃。</p>
        </div>
        <footer class="export-actions unsaved-actions">
          <button id="unsavedDiscardButton" type="button">不保存继续</button>
          <button id="unsavedCancelButton" type="button">取消</button>
          <button id="unsavedSaveButton" class="primary" type="button">保存后继续</button>
        </footer>
      </div>
    </section>

    <section id="voicePanel" class="voice-panel" hidden>
      <div>
        <strong id="voiceTitle">识别结果</strong>
        <span id="voiceMeta">待确认</span>
      </div>
      <textarea id="voiceResult" rows="3"></textarea>
      <div class="voice-actions">
        <button id="voiceAppendButton" type="button">追加</button>
        <button id="voiceReplaceButton" type="button">替换</button>
        <button id="voiceCancelButton" type="button">取消</button>
      </div>
    </section>

    <script src="/records.js?v=20260628_diagnosis_records8"></script>
    <script src="/gamepad-nav.js?v=20260628_diagnosis_records5"></script>
  </body>
</html>
